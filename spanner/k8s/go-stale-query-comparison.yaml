
apiVersion: batch/v1
kind: Job
metadata:
  namespace: spanner-ns
  name: go-stale-query-classic
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: go-stale-query-classic
    spec:
      hostNetwork: true
      restartPolicy: Never
      nodeSelector:
        iam.gke.io/gke-metadata-server-enabled: "true"
      containers:
        - name: stale-query
          image: us-west1-docker.pkg.dev/outbound-flight/spanner-box/irahul-go-client:latest
          resources:
            requests:
              memory: "400Mi"
              cpu: "0.4"
            limits:
              memory: "400Mi"
              cpu: "0.4"
          env:
            - name: PROBE_TYPE
              value: "stale_query"
            - name: OTEL_SERVICE_NAME
              value: "irahul-gbypass-stale-classic"
            - name: QPS
              value: "10"
            - name: ENDPOINT
              value: "10.142.15.195:15000"
            - name: SPANNER_DATABASE_PATH
              value: "projects/default/instances/default/databases/db"
---
